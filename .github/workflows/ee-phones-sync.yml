name: EE phones sync

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Sync mode"
        required: true
        default: "prices"
        type: choice
        options:
          - prices
          - full
  schedule:
    - cron: "15 */3 * * *"
    - cron: "40 2 * * *"

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 150
    env:
      DATABASE_URL: ${{ secrets.EU_DATABASE_URL }}
      DATABASE_POOL_MAX: "1"
      SCRAPER_USER_AGENT: "FasmetriPriceBot/0.1 (+hello@fasmetri.ge)"
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"

      - run: npm ci

      - name: Ensure sync columns exist
        run: npx prisma db execute --file prisma/migrations/20260605000000_zoommer_phone_sync_state/migration.sql

      - name: Price sync
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.mode == 'prices' || github.event_name == 'schedule' && github.event.schedule == '15 */3 * * *' }}
        env:
          NODE_USE_ENV_PROXY: "1"
          HTTPS_PROXY: ${{ secrets.SCRAPER_PROXY_URL }}
          HTTP_PROXY: ${{ secrets.SCRAPER_PROXY_URL }}
        run: npm run sync:ee:phones

      - name: Full detail sync
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.mode == 'full' || github.event_name == 'schedule' && github.event.schedule == '40 2 * * *' }}
        env:
          NODE_USE_ENV_PROXY: "1"
          HTTPS_PROXY: ${{ secrets.SCRAPER_PROXY_URL }}
          HTTP_PROXY: ${{ secrets.SCRAPER_PROXY_URL }}
        run: npm run scrape:ee:phones:full
