name: Zoommer laptops sync

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Sync mode"
        required: true
        default: "prices"
        type: choice
        options:
          - prices
          - full
  schedule:
    - cron: "0 */3 * * *"
    - cron: "20 2 * * *"

# Only one run of this sync at a time: if a long sync is still going when the
# next scheduled run fires, the newer run waits instead of stacking a second
# scrape against the same store/DB. Superseded pending runs are auto-cancelled
# (not failed), which keeps failure-email noise down.
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      DATABASE_URL: ${{ secrets.EU_DATABASE_URL }}
      DATABASE_POOL_MAX: "1"
      SCRAPER_USER_AGENT: "FasmetriPriceBot/0.1 (+hello@fasmetri.ge)"
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "24"

      - run: npm ci

      - name: Ensure sync columns exist
        run: npx prisma db execute --file prisma/migrations/20260605000000_zoommer_phone_sync_state/migration.sql

      - name: Ensure SyncLog table exists
        run: npx prisma db execute --file prisma/migrations/20260611000000_add_sync_log/migration.sql

      - name: Ensure AlertEvent table exists
        run: npx prisma db execute --file prisma/migrations/20260611100000_add_alert_event/migration.sql

      - name: Ensure PriceAnomaly table exists
        run: npx prisma db execute --file prisma/migrations/20260611120000_add_price_anomaly/migration.sql

      - name: Price sync
        id: price_sync
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.mode == 'prices' || github.event_name == 'schedule' && github.event.schedule == '0 */3 * * *' }}
        env:
          NODE_USE_ENV_PROXY: "1"
          HTTPS_PROXY: ${{ secrets.SCRAPER_PROXY_URL }}
          HTTP_PROXY: ${{ secrets.SCRAPER_PROXY_URL }}
        run: npm run sync:zoommer:laptops

      - name: Full detail sync
        id: full_sync
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.mode == 'full' || github.event_name == 'schedule' && github.event.schedule == '20 2 * * *' }}
        env:
          NODE_USE_ENV_PROXY: "1"
          HTTPS_PROXY: ${{ secrets.SCRAPER_PROXY_URL }}
          HTTP_PROXY: ${{ secrets.SCRAPER_PROXY_URL }}
        run: npm run scrape:zoommer:laptops:full

      - name: Evaluate price alerts
        if: ${{ steps.price_sync.outcome == 'success' || steps.full_sync.outcome == 'success' }}
        continue-on-error: true
        run: npm run alerts:evaluate

      # The sync writes to the DB directly, so the deployed site's cached
      # counts/summary must be busted explicitly or they go stale.
      - name: Revalidate public catalog cache
        if: ${{ steps.price_sync.outcome == 'success' || steps.full_sync.outcome == 'success' }}
        continue-on-error: true
        run: >-
          curl -fsS --retry 3
          -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
          https://fasmetri.vercel.app/api/revalidate

      - name: Log sync result
        if: ${{ always() && (steps.price_sync.outcome != 'skipped' || steps.full_sync.outcome != 'skipped') }}
        run: >-
          npx tsx scripts/log-sync.ts
          --store=zoommer --category=laptops
          --run-type=${{ steps.full_sync.outcome != 'skipped' && 'full' || 'prices' }}
          --status=${{ (steps.price_sync.outcome == 'success' || steps.full_sync.outcome == 'success') && 'success' || 'failure' }}
