name: Match products (safe canonical matcher)

# Runs automatically after each store sync completes successfully,
# or manually from the admin sync page / Actions tab.
on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - "Zoommer phones sync"
      - "Zoommer laptops sync"
      - "EE phones sync"
      - "EE laptops sync"
    types:
      - completed

jobs:
  match:
    # For workflow_run, only chain when the sync actually succeeded.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: self-hosted
    timeout-minutes: 30
    env:
      DATABASE_URL: ${{ secrets.EU_DATABASE_URL }}
      DATABASE_POOL_MAX: "1"
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "24"

      - run: npm ci

      - name: Match phones
        if: ${{ github.event_name == 'workflow_dispatch' || contains(github.event.workflow_run.name, 'phones') }}
        run: npm run match:phones -- --limit=5000

      - name: Match laptops
        if: ${{ github.event_name == 'workflow_dispatch' || contains(github.event.workflow_run.name, 'laptops') }}
        run: npm run match:laptops -- --limit=5000
